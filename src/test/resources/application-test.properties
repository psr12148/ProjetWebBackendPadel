# ===== PROFIL TEST =====
# Utilisé par @ActiveProfiles("test") dans les tests d'intégration

# ===== H2 ? base séparée pour les tests =====
spring.datasource.url=jdbc:h2:mem:padel_test_db;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== H2 Console désactivée en test =====
spring.h2.console.enabled=false

# ===== LIQUIBASE activé en test =====
# Liquibase crée le schéma ET insère l'admin (v2)
# Nécessaire pour SecurityIntegrationTest (admin@padel.be)
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml

# ===== JPA =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ===== LOGGING réduit en test =====
logging.level.root=WARN
logging.level.be.ephec.pdw=INFO
logging.level.liquibase=WARN
logging.level.org.hibernate.SQL=WARN

# ===== SCHEDULER désactivé en test =====
# Le scheduler est déclenché manuellement dans les tests
spring.task.scheduling.enabled=false

# ===== APP PROPERTIES =====
padel.reservation.duree-match-minutes=90
padel.reservation.pause-entre-matchs-minutes=15
padel.reservation.montant-match-euros=60
padel.reservation.delai-global-semaines=3
padel.reservation.delai-site-semaines=2
padel.reservation.delai-libre-jours=5
padel.scheduler.cron-j1=0 0 20 * * *
padel.cors.allowed-origins=http://localhost:4200

# ===== JWT =====
jwt.secret=ephec-pdw-super-secret-jwt-signing-key-must-be-at-least-256-bits!!
jwt.expiration=900000
jwt.refresh-expiration=604800000
