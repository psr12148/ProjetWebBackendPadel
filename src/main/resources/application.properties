# ===== APPLICATION =====
spring.application.name=ProjetWebBackendPadel

# ==== H2 Database Configuration ====
spring.datasource.url=jdbc:h2:mem:formationdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==== H2 Console ====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== LIQUIBASE =====
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml

# ===== JPA / HIBERNATE =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== JACKSON =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Europe/Brussels

# ===== SERVEUR =====
server.port=8080
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always

# ===== LOGGING =====
logging.level.root=INFO
logging.level.com.padel=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.liquibase=INFO

# ===== CUSTOM APP PROPERTIES =====
padel.reservation.duree-match-minutes=90
padel.reservation.pause-entre-matchs-minutes=15
padel.reservation.montant-match-euros=60
padel.reservation.delai-global-semaines=3
padel.reservation.delai-site-semaines=2
padel.reservation.delai-libre-jours=5

# ==== JWT Configuration ====
jwt.secret=ephec-pdw-super-secret-jwt-signing-key-must-be-at-least-256-bits!!
jwt.expiration=900000
jwt.refresh-expiration=604800000